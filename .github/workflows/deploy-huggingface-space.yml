name: Deploy Hugging Face Space

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "data/**"
      - "src/**"
      - "static/**"
      - "Dockerfile"
      - "README.hf.md"
      - "requirements-space.txt"
      - "tools/prepare_hf_space.py"
      - ".github/workflows/deploy-huggingface-space.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HF_REPO_ID: MEONN/weather-risk-assistant
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Hugging Face token
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::Please add a GitHub repository secret named HF_TOKEN with write access to Hugging Face."
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Hugging Face CLI
        run: python -m pip install -U huggingface_hub

      - name: Prepare Space files
        run: python tools/prepare_hf_space.py

      - name: Create Space if needed
        run: hf repos create "$HF_REPO_ID" --type space --space-sdk docker --exist-ok

      - name: Upload Space
        run: hf upload "$HF_REPO_ID" .hf-space-build --type space --commit-message "Deploy weather risk assistant"
